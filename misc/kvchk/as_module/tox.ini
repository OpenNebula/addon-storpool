[tox]
envlist = py38,py39,py310,py311,py312,lint
isolated_build = True

[testenv]
deps = -r requirements-dev.txt
commands =
    pytest {posargs:tests}

[testenv:lint]
deps = 
    black>=22.0
    isort>=5.10
    mypy>=1.0
commands =
    black --check src tests
    isort --check-only src tests
    mypy src tests
